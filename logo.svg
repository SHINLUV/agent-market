<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#FF006E"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="60%" stop-color="#FF006E"/>
      <stop offset="100%" stop-color="#00F0FF"/>
    </linearGradient>
  </defs>
  <!-- 几何枫叶 — 5瓣枫叶简化为5个菱形簇 -->
  <!-- 中心脉 -->
  <line x1="32" y1="14" x2="32" y2="54" stroke="url(#g)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- 左瓣 -->
  <polygon points="32,20 8,28 18,42 32,36" fill="url(#g)" opacity="0.85"/>
  <!-- 右瓣 -->
  <polygon points="32,20 56,28 46,42 32,36" fill="url(#g)" opacity="0.75"/>
  <!-- 左上瓣 -->
  <polygon points="32,22 18,8 26,26 32,28" fill="url(#g2)" opacity="0.7"/>
  <!-- 右上瓣 -->
  <polygon points="32,22 46,8 38,26 32,28" fill="url(#g2)" opacity="0.8"/>
  <!-- 中心菱形 -->
  <polygon points="32,22 38,32 32,42 26,32" fill="url(#g)" opacity="0.9"/>
  <!-- 中心亮点 -->
  <circle cx="32" cy="31" r="3" fill="#fff" opacity="0.8"/>
</svg>
